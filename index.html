<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mithunraj M — AI/ML Engineer & Computer Science graduate. Building production AI evaluation systems, agentic workflows, and deep-learning applications."
    />
    <meta name="author" content="Mithunraj M" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mithunraj M — AI/ML Engineer" />
    <meta
      property="og:description"
      content="AI/ML Engineer building production AI evaluation systems, agentic workflows, and deep-learning applications."
    />
    <meta property="og:url" content="https://Mithunraj-M.github.io/portfolio-website" />

    <!-- Set theme before paint to avoid flash of wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          // Stored choice wins; otherwise honor OS preference, defaulting to dark.
          var theme = stored || (prefersLight ? 'light' : 'dark');
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (e) {}
      })();
    </script>

    <title>Mithunraj M — AI/ML Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
